          - text: .
        - paragraph [ref=e37]:
          - strong [ref=e38]: How is ROI calculated?
          - text: ROI (Return on Investment) = Total Profit ÷ Total Invested × 100%. All calculations are based on settled bets only. No fees or commissions are included in these figures. Each bet uses a flat stake of $100 USD for consistent comparison.
