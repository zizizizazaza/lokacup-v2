          - text: "We track three betting markets: 1X2 Moneyline (match result prediction) with +$84,716.17 profit, Asian Handicap (goal line betting) with +$447,371.31 profit, and Over/Under (total goals) with +$106,927.98 profit."
        - paragraph [ref=e41]:
