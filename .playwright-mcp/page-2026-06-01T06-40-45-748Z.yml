    - article [ref=e138]:
      - generic [ref=e139]:
        - heading "How the Alphascope forecast composer works" [level=2] [ref=e140]
        - paragraph [ref=e141]: The forecast composer is built for traders who already have a market in mind but need a faster way to turn that market into research. Paste a Polymarket or Kalshi link, or ask a plain-English question, and Alphascope tries to connect the request to an active prediction market. From there, the workflow leads to a market page with live odds, AI forecast context, related news, and links back to the wider board of prediction market opportunities.
        - paragraph [ref=e142]: This is different from a generic chatbot. Prediction markets depend on exact contract wording, live prices, liquidity, and resolution sources. A useful forecast has to respect those details. The composer is designed to keep the user close to the real market instead of answering in the abstract. That makes it easier to compare the model output with the price that traders are actually paying.
      - generic [ref=e143]:
        - heading "What to ask before you trust a forecast" [level=2] [ref=e144]
        - paragraph [ref=e145]: A strong forecast should answer three questions. First, what is the market currently implying? Second, what information could make that price wrong? Third, what would need to happen before the market resolves? If the answer skips one of those steps, the forecast is not complete enough to support a trade. The current odds may already include the obvious headline, and the remaining edge may depend on timing, liquidity, or a detail buried in the resolution criteria.
        - paragraph [ref=e146]: Use the forecast as a structured second opinion. Compare it with your own estimate, then check whether the difference is large enough after fees and spread. If the market is thin, reduce the weight of the price until you know the entry is actually available. If the market is tied to official data, verify the release calendar and settlement source. If the market is driven by news, review whether related markets moved in the same direction.
      - generic [ref=e147]:
        - heading "Where the composer fits in the research process" [level=2] [ref=e148]
        - paragraph [ref=e149]:
          - text: The fastest workflow is to begin with a link or question, open the matched forecast, then branch into the supporting pages. The
          - link "Predictions" [ref=e150] [cursor=pointer]:
            - /url: /predictions
          - text: page is useful for broad discovery, the
          - link "Odds" [ref=e151] [cursor=pointer]:
            - /url: /odds
          - text: page is useful for category and topic scanning, and the
          - link "News" [ref=e152] [cursor=pointer]:
            - /url: /news
          - text: page is useful when a headline appears to be moving several markets at once. The composer sits at the top of that flow because many users arrive with a specific market in mind.
        - paragraph [ref=e153]: "Forecasts are most valuable when they shorten research time without hiding uncertainty. Alphascope surfaces the current price, the market context, and the next links to inspect, but the final decision still requires judgment. The goal is to make that judgment better informed: fewer stale prices, fewer missed catalysts, and fewer trades based on a headline that does not match the contract."
      - generic [ref=e154]:
        - heading "Forecast checks for Polymarket and Kalshi" [level=2] [ref=e155]
        - paragraph [ref=e156]: Polymarket and Kalshi can list similar questions, but the trading mechanics and resolution language may differ. Kalshi contracts often depend on regulated event contract terms and specified data sources. Polymarket markets often depend on market-specific resolution criteria and oracle processes. A forecast that looks strong on one venue may not transfer cleanly to another venue unless the question, date, outcome, and settlement source are equivalent.
        - paragraph [ref=e157]: Before acting on a forecast, compare the market with other contracts in the same theme. A crypto price target may be linked to other time windows. A sports contract may be linked to game markets and player props. An election contract may be linked to polls, turnout, candidate news, and party-control markets. The surrounding board often explains whether a price move is isolated or part of a larger repricing.
      - generic [ref=e158]:
        - heading "What the composer should not replace" [level=2] [ref=e159]
        - paragraph [ref=e160]: The composer should not replace position sizing, bankroll rules, or final contract review. A good response can point you toward useful evidence, but it cannot know your risk tolerance, tax situation, available liquidity, or whether you can actually enter at the quoted price. Keep those decisions outside the model and make them explicit before opening a position.
        - paragraph [ref=e161]: It also should not replace patience. Some markets are worth watching without trading immediately. If the forecast identifies a possible catalyst but the spread is wide, the better action may be to set an alert, wait for confirmation, or compare the market with a related contract. The fastest answer is not always the highest quality trade.
      - generic [ref=e162]:
        - heading "Examples of useful forecast questions" [level=2] [ref=e163]
        - paragraph [ref=e164]: Useful questions are specific enough to map to a market. Instead of asking whether crypto will go up, ask whether a specific Bitcoin target market is mispriced at the current probability. Instead of asking who will win an election in general, ask about a listed candidate, state, party-control market, or polling catalyst. Specific questions make it easier to compare the answer with live odds and the actual settlement criteria.
        - paragraph [ref=e165]: "Link-based forecasts are even stronger because they start from the exact contract. When you paste a Polymarket or Kalshi URL, the composer can keep the research tied to that market instead of making a broad claim about the topic. That is the safest way to use AI in prediction markets: anchor the model to a real contract, then verify the price, liquidity, and rules before acting."
